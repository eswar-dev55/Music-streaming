<!DOCTYPE html>
<html lang="en">

<head>

<title>MusicHub</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-black text-white">

<!-- Navbar -->

<nav class="bg-gray-900 p-5 flex justify-between">

<li><a href="#albums">Albums</a></li>

style="background-image:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d')">

<h2 class="text-5xl font-bold">Feel the Music</h2>

<p class="mt-4 text-lg">
Stream your favorite songs anytime

<div class="bg-gray-800 p-5 rounded text-center">

</div>

</div>

Top Artists
</h2>

Contact Us

<p>Email: musichub@gmail.com</p>

<p>Phone: +91 7842269611</p>
